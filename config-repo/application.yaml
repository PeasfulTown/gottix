eureka:

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL}

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

spring:

  datasource:
    url: ${DB_POSTGRES_URL}
    username: ${DB_POSTGRES_USERNAME}
    password: ${DB_POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

security:
  oauth2:
    resourceserver:
      jwt:
        secret-key: ThisIsADevSecretKeyThatMustBeAtLeast256BitsLongForHS256Algorithm

jwt:
  secret: ThisIsADevSecretKeyThatMustBeAtLeast256BitsLongForHS256Algorithm
  expiration-ms: 86400000        # 24 h
  refresh-expiration-ms: 604800000  # 7 d

logging:
  level:
    org.springframework.security: WARN
