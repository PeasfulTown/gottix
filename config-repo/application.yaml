eureka:

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL}

  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

spring:

  datasource:
    url: ${DB_POSTGRES_URL}
    username: ${DB_POSTGRES_USERNAME}
    password: ${DB_POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  rabbitmq:
    host: localhost
    port: 5672
    username: user
    password: password
    virtual-host: gottix

rabbitmq:
  exchange:
    main: main
  queue:
    ticket-change: ticket.change
    ticket-comment-change: ticket-comment-change
  routing-key:
    ticket-change: ticket.change
    ticket-comment-change: ticket-comment-change

security:
  oauth2:
    resourceserver:
      jwt:
        secret-key: VGhpc0lzQURldlNlY3JldEtleVRoYXRNdXN0QmVBdExlYXN0MjU2Qml0c0xvbmdGb3JIUzI1NkFsZ29yaXRobQ==

