spring:

  cloud:
    config:
      enabled: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  rabbitmq:
    virtual-host: gottix-test

eureka:
  client:
    enabled: false

logging:
  level:
    com.ticketing: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
