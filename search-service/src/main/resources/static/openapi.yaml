openapi: 3.0.1
info:
  title: Gottix Search Service
  description: |
    Handles the search component of the customer support tickets microservices platform
  contact:
    email: emrin4@gmail.com
  license:
    name: MIT
    url: https://mit-license.org/
  version: 0.0.1

tags:
  - name: ticket
    description: Ticket search endpoint


paths:
  /api/v1/search/tickets:
    get:
      tags: [ ticket ]
      summary: Search tickets
      operationId: searchTickets
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/SearchStringQuery'
        - $ref: '#/components/parameters/TicketStatusQuery'
        - $ref: '#/components/parameters/TicketPriorityQuery'
        - $ref: '#/components/parameters/CustomerIdQuery'
        - $ref: '#/components/parameters/AssignedAgentIdQuery'
        - $ref: '#/components/parameters/SortByQuery'
        - $ref: '#/components/parameters/SortOrderQuery'
        - $ref: '#/components/parameters/PageNumberQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          $ref: '#/components/responses/PagedTicketResponse'

  /api/v1/search/tickets/suggestions:
    get:
      tags: [ ticket ]
      summary: Ticket search suggestions
      operationId: searchTicketsSuggestion
      parameters:
        - $ref: '#/components/parameters/UserIdHeader'
        - $ref: '#/components/parameters/UserRoleHeader'
        - $ref: '#/components/parameters/SearchStringQuery'
        - $ref: '#/components/parameters/SuggestionLimitQuery'
      responses:
        '200':
          $ref: '#/components/responses/TicketSearchSuggestion'


components:
  parameters:

    UserIdHeader:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string

    UserRoleHeader:
      name: X-User-Role
      in: header
      required: true
      schema:
        type: string

    SearchStringQuery:
      name: search
      in: query
      schema:
        type: string

    TicketStatusQuery:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/TicketStatus'

    TicketPriorityQuery:
      name: priority
      in: query
      schema:
        $ref: '#/components/schemas/TicketPriority'

    CustomerIdQuery:
      name: customerId
      in: query
      schema:
        type: string

    AssignedAgentIdQuery:
      name: assignedAgentId
      in: query
      schema:
        type: string

    SortByQuery:
      name: sortBy
      in: query
      schema:
        $ref: '#/components/schemas/SortField'

    SortOrderQuery:
      name: sortOrder
      in: query
      schema:
        $ref: '#/components/schemas/SortOrder'

    PageNumberQuery:
      name: pageNumber
      in: query
      schema:
        type: integer
        format: int32
        default: 0

    PageSizeQuery:
      name: pageSize
      in: query
      schema:
        type: integer
        format: int32

    SuggestionLimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        format: int32

  responses:

    PagedTicketResponse:
      description: Paginated array of tickets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PagedTicketResponse'

    TicketSearchSuggestion:
      description: List of titles suggestion
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchSuggestion'

  schemas:

    TicketStatus:
      type: string
      enum:
        - OPENED
        - IN_PROGRESS
        - RESOLVED
        - CLOSED

    TicketPriority:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH

    SortField:
      type: string
      enum:
        - CREATED_AT
        - UPDATED_AT

    SortOrder:
      type: string
      enum:
        - ASC
        - DESC

    ResponsePage:
      type: object
      properties:
        size:
          type: integer
          format: int32
        number:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32

    PagedResponse:
      type: object
      properties:
        content:
          type: array
          items: {}
        page:
          $ref: '#/components/schemas/ResponsePage'

    PagedTicketResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Ticket'

    Ticket:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/TicketStatus'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        customerId:
          type: string
        assignedAgentId:
          type: string
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: string
        authorId:
          type: string
        body:
          type: string
#        createdAt:
#          type: string
#          format: date-time
#        updatedAt:
#          type: string
#          format: date-time

    SearchSuggestion:
      type: object
      properties:
        suggestions:
          type: array
          items:
            type: string